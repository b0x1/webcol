<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Sky -->
  <rect width="32" height="19" fill="#4A90D9"/>
  <!-- Fog bank (unknown territory, right side) -->
  <rect x="20" y="0" width="12" height="19" fill="#A8C4D8" opacity="0.38"/>
  <rect x="23" y="0" width="9"  height="19" fill="#C0D8E8" opacity="0.48"/>
  <rect x="26" y="0" width="6"  height="19" fill="#D4E8F0" opacity="0.60"/>
  <rect x="28" y="0" width="4"  height="19" fill="#E4F0F8" opacity="0.75"/>
  <!-- Unknown land dimly visible through fog -->
  <rect x="26" y="5"  width="6" height="14" fill="#1B5E20" opacity="0.28"/>
  <rect x="29" y="3"  width="3" height="16" fill="#2E7D32" opacity="0.22"/>
  <!-- Ocean -->
  <rect x="0" y="19" width="32" height="13" fill="#1565C0"/>
  <rect x="0" y="19" width="32" height="1"  fill="#1976D2"/>
  <rect x="0" y="20" width="32" height="1"  fill="#1E88E5"/>
  <!-- Waves -->
  <rect x="1"  y="22" width="5" height="1" fill="#2196F3"/>
  <rect x="9"  y="21" width="4" height="1" fill="#2196F3"/>
  <rect x="16" y="22" width="5" height="1" fill="#2196F3"/>
  <rect x="23" y="21" width="4" height="1" fill="#2196F3"/>
  <rect x="3"  y="25" width="6" height="1" fill="#1055A0"/>
  <rect x="13" y="26" width="5" height="1" fill="#1055A0"/>
  <rect x="21" y="25" width="6" height="1" fill="#1055A0"/>
  <!-- Mast -->
  <rect x="10" y="3" width="1" height="13" fill="#3E2723"/>
  <!-- Flag -->
  <rect x="11" y="3" width="3" height="2" fill="#B71C1C"/>
  <!-- Main sail (billowing right toward the unknown) -->
  <rect x="11" y="4"  width="1" height="1" fill="#FFFDE7"/>
  <rect x="11" y="5"  width="2" height="1" fill="#FFFDE7"/>
  <rect x="11" y="6"  width="3" height="1" fill="#FFFDE7"/>
  <rect x="11" y="7"  width="5" height="1" fill="#FFFDE7"/>
  <rect x="11" y="8"  width="6" height="1" fill="#FFFDE7"/>
  <rect x="11" y="9"  width="7" height="1" fill="#FFF9C4"/>
  <rect x="11" y="10" width="7" height="1" fill="#FFF9C4"/>
  <rect x="11" y="11" width="6" height="1" fill="#FFF9C4"/>
  <rect x="11" y="12" width="5" height="1" fill="#FFF8DC"/>
  <rect x="11" y="13" width="4" height="1" fill="#FFF8DC"/>
  <rect x="11" y="14" width="3" height="1" fill="#EFE0C0"/>
  <!-- Hull -->
  <rect x="7"  y="15" width="13" height="1" fill="#8D6E63"/>
  <rect x="6"  y="16" width="15" height="1" fill="#795548"/>
  <rect x="6"  y="17" width="15" height="1" fill="#6D4C41"/>
  <rect x="7"  y="18" width="14" height="1" fill="#5D4037"/>
  <!-- Bow (right, pointed) -->
  <rect x="20" y="16" width="2"  height="1" fill="#795548"/>
  <rect x="21" y="17" width="1"  height="1" fill="#6D4C41"/>
  <!-- Stern (left) -->
  <rect x="5"  y="16" width="1"  height="2" fill="#4E342E"/>
</svg>
