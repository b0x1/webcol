  <rect x="21" y="9"  width="1" height="1" fill="#FFFDE7"/>
  <rect x="21" y="10" width="3" height="1" fill="#FFFDE7"/>
  <rect x="21" y="11" width="5" height="1" fill="#FFFDE7"/>
  <rect x="21" y="12" width="6" height="1" fill="#FFFDE7"/>
  <rect x="21" y="13" width="5" height="1" fill="#FFFDE7"/>
  <rect x="21" y="14" width="4" height="1" fill="#FFF9C4"/>
