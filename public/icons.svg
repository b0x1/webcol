  <rect x="4" y="4" width="3" height="4" fill="#FFFFF0"/>
  <rect x="5" y="3" width="2" height="1" fill="#FFFFF0"/>
  <rect x="5" y="8" width="2" height="1" fill="#FFFFF0"/>
  <rect x="6" y="4" width="1" height="4" fill="#3A7BBF"/>
  <!-- Fog bank (right side - unknown territory) -->
  <rect x="37" y="0" width="4"  height="40" fill="#88AACC" opacity="0.35"/>
  <rect x="41" y="0" width="4"  height="40" fill="#A0BCCF" opacity="0.45"/>
  <rect x="45" y="0" width="4"  height="40" fill="#B8CEE0" opacity="0.55"/>
  <rect x="49" y="0" width="4"  height="40" fill="#C8D8E8" opacity="0.65"/>
  <rect x="53" y="0" width="4"  height="40" fill="#D4E4EE" opacity="0.75"/>
  <rect x="57" y="0" width="4"  height="40" fill="#DCE8F2" opacity="0.85"/>
  <rect x="61" y="0" width="3"  height="40" fill="#E4EEF6" opacity="0.92"/>
  <!-- Unknown land/coastline through fog -->
  <rect x="50" y="12" width="10" height="28" fill="#1B5E20" opacity="0.28"/>
  <rect x="54" y="8"  width="10" height="32" fill="#2E7D32" opacity="0.22"/>
  <rect x="58" y="5"  width="6"  height="35" fill="#1B5E20" opacity="0.25"/>
  <!-- Mountain silhouette hints -->
  <rect x="56" y="12" width="2" height="2" fill="#2E7D32" opacity="0.30"/>
  <rect x="57" y="10" width="2" height="2" fill="#1B5E20" opacity="0.28"/>
  <rect x="58" y="8"  width="2" height="2" fill="#2E7D32" opacity="0.25"/>
  <!-- Ocean -->
  <rect x="0" y="40" width="64" height="24" fill="#1565C0"/>
  <rect x="0" y="40" width="64" height="2"  fill="#1976D2"/>
  <rect x="0" y="42" width="64" height="1"  fill="#1E88E5"/>
