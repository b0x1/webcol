  <rect x="1"  y="44" width="8"  height="1" fill="#2196F3"/>
  <rect x="12" y="45" width="7"  height="1" fill="#2196F3"/>
  <rect x="22" y="44" width="8"  height="1" fill="#2196F3"/>
  <rect x="33" y="45" width="7"  height="1" fill="#2196F3"/>
  <rect x="43" y="44" width="7"  height="1" fill="#2196F3"/>
  <rect x="52" y="45" width="7"  height="1" fill="#2196F3"/>
  <rect x="4"  y="48" width="10" height="1" fill="#1055A0"/>
  <rect x="18" y="49" width="8"  height="1" fill="#1055A0"/>
  <rect x="30" y="48" width="10" height="1" fill="#1055A0"/>
  <rect x="44" y="49" width="8"  height="1" fill="#1055A0"/>
  <rect x="0"  y="53" width="64" height="1" fill="#0D47A1"/>
  <rect x="0"  y="57" width="64" height="1" fill="#0C3F93"/>
  <!-- === SHIP === -->
  <!-- Stern decoration -->
  <rect x="8" y="35" width="2" height="4" fill="#3E2723"/>
  <rect x="9" y="34" width="1" height="1" fill="#6D4C41"/>
  <!-- Hull -->
  <rect x="8"  y="36" width="30" height="1" fill="#8D6E63"/>
  <rect x="7"  y="37" width="32" height="1" fill="#795548"/>
  <rect x="7"  y="38" width="32" height="1" fill="#6D4C41"/>
  <rect x="8"  y="39" width="30" height="1" fill="#5D4037"/>
  <rect x="9"  y="40" width="28" height="1" fill="#4E342E"/>
