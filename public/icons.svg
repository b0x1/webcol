<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Sky -->
  <rect width="64" height="40" fill="#3A7BBF"/>
  <!-- Stars -->
  <rect x="1"  y="2"  width="1" height="1" fill="#FFFFFF" opacity="0.7"/>
