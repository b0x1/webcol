  <rect x="21" y="16" width="3"  height="1" fill="#FFFDE7"/>
  <rect x="21" y="17" width="5"  height="1" fill="#FFFDE7"/>
  <rect x="21" y="18" width="7"  height="1" fill="#FFFDE7"/>
  <rect x="21" y="19" width="9"  height="1" fill="#FFF9C4"/>
  <rect x="21" y="20" width="10" height="1" fill="#FFF9C4"/>
  <rect x="21" y="21" width="11" height="1" fill="#FFF9C4"/>
  <rect x="21" y="22" width="11" height="1" fill="#FFF9C4"/>
  <rect x="21" y="23" width="10" height="1" fill="#FFF9C4"/>
  <rect x="21" y="24" width="9"  height="1" fill="#FFF8DC"/>
  <rect x="21" y="25" width="8"  height="1" fill="#FFF8DC"/>
  <rect x="21" y="26" width="8"  height="1" fill="#FFF8DC"/>
  <rect x="21" y="27" width="7"  height="1" fill="#FFF8DC"/>
  <rect x="21" y="28" width="6"  height="1" fill="#FFF8DC"/>
  <rect x="21" y="29" width="5"  height="1" fill="#EFE8C8"/>
  <rect x="21" y="30" width="4"  height="1" fill="#EFE8C8"/>
  <rect x="21" y="31" width="3"  height="1" fill="#EFE8C8"/>
  <rect x="21" y="32" width="2"  height="1" fill="#EFE8C8"/>
  <rect x="21" y="33" width="1"  height="1" fill="#EFE8C8"/>
  <!-- Bowsprit (diagonal spar at front) -->
  <rect x="37" y="33" width="3" height="1" fill="#3E2723"/>
  <rect x="39" y="32" width="3" height="1" fill="#3E2723"/>
  <rect x="41" y="31" width="2" height="1" fill="#3E2723"/>
  <!-- Jib sail (front triangular sail pointing toward the unknown) -->
  <rect x="36" y="29" width="2" height="1" fill="#FFFDE7"/>
  <rect x="35" y="30" width="3" height="1" fill="#FFFDE7"/>
  <rect x="34" y="31" width="4" height="1" fill="#FFFDE7"/>
  <rect x="34" y="32" width="5" height="1" fill="#FFFDE7"/>
  <rect x="35" y="33" width="4" height="1" fill="#FFFDE7"/>
</svg>
