  <rect x="30" y="18" width="1" height="18" fill="#3E2723"/>
  <!-- Fore topsail -->
  <rect x="31" y="20" width="1" height="1" fill="#FFFDE7"/>
  <rect x="31" y="21" width="2" height="1" fill="#FFFDE7"/>
  <rect x="31" y="22" width="3" height="1" fill="#FFFDE7"/>
  <rect x="31" y="23" width="4" height="1" fill="#FFF9C4"/>
  <rect x="31" y="24" width="5" height="1" fill="#FFF9C4"/>
  <rect x="31" y="25" width="4" height="1" fill="#FFF9C4"/>
  <rect x="31" y="26" width="3" height="1" fill="#FFF9C4"/>
  <rect x="31" y="27" width="2" height="1" fill="#FFF9C4"/>
  <!-- Mainmast -->
  <rect x="20" y="5" width="1" height="31" fill="#3E2723"/>
  <!-- Flag -->
  <rect x="21" y="5" width="5" height="2" fill="#B71C1C"/>
  <rect x="21" y="7" width="4" height="2" fill="#CC2020"/>
