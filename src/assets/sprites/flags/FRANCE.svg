<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges" image-rendering="pixelated" width="64" height="64">
  <!-- Royal blue field -->
  <rect x="0" y="0" width="64" height="64" fill="#002395"/>

  <!-- ═══ Fleur-de-lis 1 — top-left (TL anchor 4,2) ═══ -->
  <!-- Spine / center column -->
  <rect x="10" y="2"  width="4" height="26" fill="#FFD700"/>
  <!-- Top petal spread -->
  <rect x="8"  y="6"  width="8" height="4"  fill="#FFD700"/>
  <!-- Left wing -->
  <rect x="4"  y="10" width="7" height="4"  fill="#FFD700"/>
  <!-- Right wing -->
  <rect x="13" y="10" width="7" height="4"  fill="#FFD700"/>
  <!-- Collar band -->
  <rect x="7"  y="18" width="10" height="4" fill="#FFD700"/>
  <!-- Base left petal -->
  <rect x="4"  y="24" width="7" height="4"  fill="#FFD700"/>
  <!-- Base right petal -->
  <rect x="13" y="24" width="7" height="4"  fill="#FFD700"/>

  <!-- ═══ Fleur-de-lis 2 — top-right (TL anchor 44,2) ═══ -->
  <rect x="50" y="2"  width="4" height="26" fill="#FFD700"/>
  <rect x="48" y="6"  width="8" height="4"  fill="#FFD700"/>
  <rect x="44" y="10" width="7" height="4"  fill="#FFD700"/>
  <rect x="53" y="10" width="7" height="4"  fill="#FFD700"/>
  <rect x="47" y="18" width="10" height="4" fill="#FFD700"/>
  <rect x="44" y="24" width="7" height="4"  fill="#FFD700"/>
  <rect x="53" y="24" width="7" height="4"  fill="#FFD700"/>

  <!-- ═══ Fleur-de-lis 3 — bottom-centre (TL anchor 24,34) ═══ -->
  <rect x="30" y="34" width="4" height="26" fill="#FFD700"/>
  <rect x="28" y="38" width="8" height="4"  fill="#FFD700"/>
  <rect x="24" y="42" width="7" height="4"  fill="#FFD700"/>
  <rect x="33" y="42" width="7" height="4"  fill="#FFD700"/>
  <rect x="27" y="50" width="10" height="4" fill="#FFD700"/>
  <rect x="24" y="56" width="7" height="4"  fill="#FFD700"/>
  <rect x="33" y="56" width="7" height="4"  fill="#FFD700"/>
</svg>
